      <rect x="10" y={CH - 26} width={CW - 20} height="18" rx="2" fill="rgba(3,6,18,.88)" />
      <text x="95" y={CH - 13} textAnchor="middle" fontFamily="'Cinzel Decorative',serif" fontSize="7.5" fontWeight="400" fill={GOLD} opacity=".95" letterSpacing="1.8">THE MAGICIAN</text>
      {[[14, 14], [CW - 14, 14], [14, CH - 14], [CW - 14, CH - 14]].map(([cx, cy], i) =>
      <g key={i} stroke={GOLD} strokeWidth=".9" opacity=".48">
          <line x1={cx - 5} y1={cy} x2={cx + 5} y2={cy} /><line x1={cx} y1={cy - 5} x2={cx} y2={cy + 5} />
        </g>
      )}
    </svg>);

}

// ── Gold Particles ─────────────────────────────────────────────────────────
function GoldParticles({ cx, cy, t }) {
  return (
    <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
      {PARTS.map((p, i) => {
        const a = p.angle + t * p.speed,r = p.radius * (.85 + .15 * Math.sin(t * .8 + p.phase));
        const x = cx + Math.cos(a) * r,y = cy + Math.sin(a) * r;
        const op = (.35 + .55 * Math.sin(t * 1.5 + p.phase)) * .62;
        return <circle key={i} cx={x} cy={y} r={p.size} fill={p.bright ? GOLD_L : GOLD} opacity={Math.max(0, op)} />;
      })}
      {Array.from({ length: 8 }, (_, i) => {
        const a = i / 8 * Math.PI * 2 + t * .09,r = 148 + 32 * Math.sin(t * .55 + i * .9);
        const x = cx + Math.cos(a) * r,y = cy + Math.sin(a) * r;
        const op = .18 + .38 * Math.sin(t * 1 + i * .75);
        return <circle key={`d${i}`} cx={x} cy={y} r={2.8} fill={GOLD_L} opacity={Math.max(0, op)} />;
      })}
    </svg>);

}

// ── Single Card renderer ───────────────────────────────────────────────────
function TarotCard({ x, y, rotZ, rotY, opacity, zIndex, cursor, brightness, showFront, glow, onClick, onEnter, onLeave, shadow }) {
  const dispRotY = rotY >= 90 ? rotY - 180 : rotY;
  const flash = Math.max(0, 1 - Math.abs(rotY - 90) / 16);
  const boxShadow = glow > 0 ?
  `0 0 ${14 + glow * 55}px rgba(201,168,76,${glow * .58}),0 0 ${55 + glow * 90}px rgba(201,168,76,${glow * .22}),0 14px 36px rgba(0,0,0,.75)` :
  '0 12px 32px rgba(0,0,0,.72)';
  return (
    <div onClick={onClick} onMouseEnter={onEnter} onMouseLeave={onLeave}
    style={{ position: 'absolute', left: x, top: y, width: CW, height: CH,
      transform: `rotate(${rotZ}deg)`, transformOrigin: 'center bottom',
      opacity, zIndex, cursor: cursor || 'default', filter: `brightness(${brightness ?? 1})`,
      willChange: 'transform,opacity' }}>
      <div style={{ position: 'absolute', inset: 0, transform: `perspective(700px) rotateY(${dispRotY}deg)`,
        transformOrigin: 'center center', borderRadius: 6, boxShadow }}>
        {showFront ? <MagicianFace /> : <CardBack />}
      </div>
      {flash > 0.02 &&
      <div style={{ position: 'absolute', inset: 0, borderRadius: 6, pointerEvents: 'none',
        background: `radial-gradient(ellipse at center,rgba(255,230,90,${flash * .92}),rgba(201,168,76,${flash * .5}) 32%,transparent 60%)` }} />
      }
    </div>);

}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  // Global elapsed timer
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    const s = performance.now();let raf;
    const tick = () => {setT((performance.now() - s) / 1000);raf = requestAnimationFrame(tick);};
    raf = requestAnimationFrame(tick);return () => cancelAnimationFrame(raf);
  }, []);

  // Phase state
  const [phase, setPhase] = React.useState('intro');
  const [sel, setSel] = React.useState(null);
  const [hov, setHov] = React.useState(null);
  const phaseT0 = React.useRef(0); // globalT when phase started
  const pT = t - phaseT0.current; // time within current phase

  const goPhase = (p) => {setPhase(p);phaseT0.current = t;};

  // Auto-transitions
  React.useEffect(() => {
    if (phase === 'intro' && pT > 2.8) {goPhase('idle');}
    if (phase === 'revealing' && pT > 2.0) {goPhase('revealed');}
    if (phase === 'shuffle' && pT > 3.5) {setSel(null);goPhase('idle');}
  }, [phase, pT]);

  const handleClick = (idx) => {
    if (phase !== 'idle') return;
    setSel(idx);goPhase('revealing');
  };
  const handleShuffle = () => {
    if (phase !== 'revealed') return;
    goPhase('shuffle');
  };

  // ── Compute per-card props ───────────────────────────────────────────────
  const cards = Array.from({ length: 5 }, (_, idx) => {
    const fanX = SW / 2 - CW / 2 + FAN_X_OFFS[idx];
    const fanY = FAN_CY - CH / 2;
    const fanRZ = FAN_ANGLES[idx];
    const deckX = SW / 2 - CW / 2,deckY = DECK_CY - CH / 2;
    const revX = SW / 2 - CW / 2,revY = REV_CY - CH / 2;
    const isSel = idx === sel;

    if (phase === 'intro') {
      const stag = idx * .14;
      const p = eoB(cl((pT - 1.0 - stag) / 1.1, 0, 1));
      return { x: fanX, y: SH + 80 + (fanY - SH - 80) * p, rotZ: fanRZ, rotY: 0, opacity: p, zIndex: idx, brightness: 1, showFront: false, cursor: 'default' };
    }
    if (phase === 'idle') {
      const isH = hov === idx;
      return { x: fanX, y: fanY - (isH ? 22 : 0), rotZ: fanRZ, rotY: 0, opacity: 1, zIndex: isH ? 20 : idx,
        brightness: isH ? 1.18 : 1, showFront: false, cursor: 'pointer',
        onEnter: () => setHov(idx), onLeave: () => setHov(null) };
    }
    if (phase === 'revealing') {
      if (isSel) {
        const movP = eoC(cl(pT / .75, 0, 1));
        const flipP = cl((pT - .5) / 1.2, 0, 1);
        const rotY = eiC(flipP) * 180;
        return { x: fanX + (revX - fanX) * movP, y: fanY + (revY - fanY) * movP,
          rotZ: fanRZ * (1 - movP), rotY, opacity: 1, zIndex: 30, brightness: 1, showFront: rotY >= 90, cursor: 'default' };
      }
      return { x: fanX, y: fanY, rotZ: fanRZ, rotY: 0, opacity: .45, zIndex: idx, brightness: .55, showFront: false, cursor: 'default' };
    }
    if (phase === 'revealed') {
      if (isSel) {
        const fy = Math.sin(t * 1.2) * 5;
        const glow = .5 + .44 * Math.sin(t * 1.9);
        return { x: revX, y: revY + fy, rotZ: 0, rotY: 180, opacity: 1, zIndex: 30, brightness: 1, showFront: true, glow, cursor: 'default' };
      }
      return { x: fanX, y: fanY, rotZ: fanRZ, rotY: 0, opacity: .38, zIndex: idx, brightness: .5, showFront: false, cursor: 'default' };
    }
    if (phase === 'shuffle') {
      // Sub-phases:
      // 0.00-0.40  flip selected back face-down
      // 0.40-0.95  collapse all to deck
      // 0.95-1.40  split: even→right, odd→left
      // 1.40-1.85  merge
      // 1.85-2.30  split: odd→right, even→left
      // 2.30-2.75  merge
      // 2.75-3.50  fan back out

      const deckRZ = (idx - 2) * 2;

      if (pT < 0.40) {
        const fp = eiC(cl(pT / .40, 0, 1));
        if (isSel) {
          const rotY = 180 * (1 - fp);
          return { x: revX, y: revY, rotZ: 0, rotY, opacity: 1, zIndex: 30, brightness: 1, showFront: rotY >= 90, cursor: 'default' };
        }
        return { x: fanX, y: fanY, rotZ: fanRZ, rotY: 0, opacity: .38 + fp * .62, zIndex: idx, brightness: .5 + fp * .5, showFront: false, cursor: 'default' };
      }
      if (pT < 0.95) {
        const tp = pT - .40,dur = .55,stag = idx * .055;
        const p = eoC(cl((tp - stag) / (dur - stag), 0, 1));
        const sx = isSel ? revX : fanX,sy = isSel ? revY : fanY,srz = isSel ? 0 : fanRZ;
        return { x: sx + (deckX - sx) * p, y: sy + (deckY - sy) * p, rotZ: srz + (deckRZ - srz) * p,
          rotY: 0, opacity: 1, zIndex: 5 - Math.abs(idx - 2), brightness: 1, showFront: false, cursor: 'default' };
      }
      if (pT < 1.40) {
        const p = eoC(cl((pT - .95) / .45, 0, 1));
        const right = idx % 2 === 0;
        const sx = right ? 80 : -80,sy = right ? -10 : 10;
        const grz = deckRZ + (right ? 6 : -6);
        return { x: deckX + sx * p, y: deckY + sy * p, rotZ: deckRZ + (grz - deckRZ) * p,
          rotY: 0, opacity: 1, zIndex: right ? 10 + idx : 5 + idx, brightness: 1, showFront: false, cursor: 'default' };
      }
      if (pT < 1.85) {
        const p = eoC(cl((pT - 1.40) / .45, 0, 1));
        const right = idx % 2 === 0;
        const sx = right ? 80 : -80,sy = right ? -10 : 10;
        const grz = deckRZ + (right ? 6 : -6);
        const endRZ = (idx - 2) * 1.2;
        return { x: deckX + sx * (1 - p), y: deckY + sy * (1 - p), rotZ: grz + (endRZ - grz) * p,
          rotY: 0, opacity: 1, zIndex: right ? 5 + idx : 10 + idx, brightness: 1, showFront: false, cursor: 'default' };
      }
      if (pT < 2.30) {
        const p = eoC(cl((pT - 1.85) / .45, 0, 1));
        const right = idx % 2 !== 0;
        const sx = right ? 75 : -75,sy = right ? -8 : 8;
        const startRZ = (idx - 2) * 1.2;
        const grz = startRZ + (right ? 5 : -5);
        return { x: deckX + sx * p, y: deckY + sy * p, rotZ: startRZ + (grz - startRZ) * p,
          rotY: 0, opacity: 1, zIndex: right ? 10 + idx : 5 + idx, brightness: 1, showFront: false, cursor: 'default' };
      }
      if (pT < 2.75) {
        const p = eoC(cl((pT - 2.30) / .45, 0, 1));
        const right = idx % 2 !== 0;
        const sx = right ? 75 : -75,sy = right ? -8 : 8;
        const startRZ = (idx - 2) * 1.2 + (right ? 5 : -5);
        return { x: deckX + sx * (1 - p), y: deckY + sy * (1 - p), rotZ: startRZ * (1 - p),
          rotY: 0, opacity: 1, zIndex: 5 - Math.abs(idx - 2), brightness: 1, showFront: false, cursor: 'default' };
      }
      // Fan back out
      const stag = idx * .09;
      const p = eoB(cl((pT - 2.75 - stag) / .55, 0, 1));
      return { x: deckX + (fanX - deckX) * p, y: deckY + (fanY - deckY) * p,
        rotZ: FAN_ANGLES[idx] * p, rotY: 0, opacity: 1, zIndex: idx, brightness: 1, showFront: false, cursor: phase === 'idle' ? 'pointer' : 'default' };
    }
    return { x: fanX, y: fanY, rotZ: fanRZ, rotY: 0, opacity: 1, zIndex: idx, brightness: 1, showFront: false, cursor: 'default' };
  });

  // Reveal glow/particles
  const revealGlow = phase === 'revealed';
  const titleOp = revealGlow ? cl((t - phaseT0.current - .8) / 1.2, 0, 1) : 0;
  const subOp = revealGlow ? cl((t - phaseT0.current - 1.8) / 1.0, 0, 1) : 0;
  const shuffleHintOp = revealGlow ? cl((t - phaseT0.current - 1.4) / 1.0, 0, 1) : 0;
  const hintOp = phase === 'idle' ? cl((t - phaseT0.current - .3) / 1.0, 0, 1) : 0;

  // Vignette
  const vign = <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(ellipse 85% 85% at 50% 50%,transparent 55%,rgba(2,4,14,.6) 100%)', pointerEvents: 'none', zIndex: 50 }} />;

  return (
    <ScaleWrap>
      <div style={{ position: 'absolute', inset: 0, background: NAVY, fontFamily: "Inter" }}>
        <Nebula t={t} />
        <StarField t={t} />

        {/* Cards */}
        {cards.map((c, idx) =>
        <TarotCard key={idx} {...c}
        onClick={() => handleClick(idx)}
        onEnter={c.onEnter}
        onLeave={c.onLeave} />

        )}

        {/* Reveal particles */}
        {revealGlow && <GoldParticles cx={SW / 2} cy={REV_CY} t={t} />}

        {/* Title */}
        <div style={{ position: 'absolute', left: 0, right: 0, top: REV_CY + CH / 2 + 28,
          textAlign: 'center', opacity: titleOp, pointerEvents: 'none', zIndex: 40 }}>
          <div style={{ fontFamily: "'Cinzel Decorative',serif", color: GOLD_L, fontSize: 26, letterSpacing: 9,
            textShadow: `0 0 16px rgba(201,168,76,.88),0 0 42px rgba(201,168,76,.38),0 0 80px rgba(201,168,76,.16)` }}>
            THE MAGICIAN
          </div>
          <div style={{ marginTop: 12, fontFamily: "'Cinzel',serif", color: GOLD, fontSize: 11,
            letterSpacing: 5, opacity: subOp, textShadow: `0 0 10px rgba(201,168,76,.65)` }}>
            AS ABOVE · SO BELOW
          </div>
        </div>

        {/* Shuffle button */}
        {revealGlow &&
        <ShuffleBtn opacity={shuffleHintOp} onClick={handleShuffle} t={t} />
        }

        {/* Choose card hint */}
        {phase === 'idle' && hintOp > 0 &&
        <div style={{ position: 'absolute', left: 0, right: 0, bottom: 68,
          textAlign: 'center', opacity: hintOp * .7, pointerEvents: 'none', zIndex: 40,
          fontFamily: "'Cinzel',serif", color: GOLD, fontSize: 13, letterSpacing: 4,
          textShadow: `0 0 10px rgba(201,168,76,.5)` }}>
            CHOOSE YOUR CARD
          </div>
        }

        {vign}
      </div>
    </ScaleWrap>);

}

// ── Shuffle Button ─────────────────────────────────────────────────────────
function ShuffleBtn({ opacity, onClick, t }) {
  const [hov, setHov] = React.useState(false);
  const pulse = .85 + .15 * Math.sin(t * 2.2);
  return (
    <div onClick={onClick}
    onMouseEnter={() => setHov(true)}
    onMouseLeave={() => setHov(false)}
    style={{
      position: 'absolute', bottom: 52, left: '50%', transform: 'translateX(-50%)',
      opacity, pointerEvents: opacity > .3 ? 'all' : 'none', zIndex: 45,
      cursor: 'pointer'
    }}>
      {/* Outer glow ring */}
      <div style={{
        position: 'absolute', inset: -12, borderRadius: 40,
        background: `radial-gradient(ellipse at center,rgba(201,168,76,${(hov ? .35 : .2) * pulse}),transparent 70%)`,
        pointerEvents: 'none'
      }} />
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '14px 38px',
        border: `1px solid rgba(201,168,76,${hov ? .9 : .55})`,
        borderRadius: 32,
        background: `rgba(6,10,31,${hov ? .92 : .75})`,
        fontFamily: "'Cinzel',serif",
        color: hov ? GOLD_L : GOLD,
        fontSize: 13,
        letterSpacing: 6,
        textShadow: hov ? `0 0 14px rgba(201,168,76,.8)` : 'none',
        transition: 'all .2s',
        boxShadow: hov ?
        `0 0 20px rgba(201,168,76,.3),inset 0 0 10px rgba(201,168,76,.1)` :
        `0 0 8px rgba(201,168,76,.15)`,
        userSelect: 'none'
      }}>
        {/* Shuffle icon */}
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" opacity=".85">
          <path d="M1 4h9l3 3-3 3H1M10 4l2-2M10 10l2 2" stroke={hov ? GOLD_L : GOLD} strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round" />
          <path d="M1 8h7" stroke={hov ? GOLD_L : GOLD} strokeWidth="1.3" strokeLinecap="round" opacity=".5" />
        </svg>
        SHUFFLE
      </div>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
